    <!-- Theme bootstrap: default dark, follow system unless user has explicit preference -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme'); // 'dark' | 'light' | 'system' | null
          var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          // Default behavior:
          // - No saved preference  -> follow system, but DEFAULT TO DARK
          // - saved === 'system'   -> follow system
          // - saved === 'dark'/'light' -> respect explicit choice
          var useDark;
          if (saved === 'dark') useDark = true;
          else if (saved === 'light') useDark = false;
          else if (saved === 'system') useDark = systemDark;
          else useDark = true || systemDark; // default dark on first visit
          document.documentElement.classList.toggle('dark', useDark);
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
